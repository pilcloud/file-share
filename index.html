<script>

let uploadUnlocked = false;
let activeFolder = null;
let state = {};

// ==================== Supabase 헬퍼 ====================
async function fetchFolders() {
  const { data, error } = await supabase.from('folders').select('*').order('name');
  if (error) console.error(error);
  return data || [];
}

async function fetchFiles(folderName) {
  const { data, error } = await supabase
    .from('files')
    .select('*')
    .eq('folder_name', folderName)
    .order('created_at', { ascending: false });
  if (error) console.error(error);
  return data || [];
}

// 실시간 구독
function subscribeToFiles() {
  supabase
    .channel('files-changes')
    .on('postgres_changes', 
      { event: '*', schema: 'public', table: 'files' },
      () => {
        if (activeFolder) renderFiles();
        else renderFolders();
      }
    )
    .subscribe();
}

// ==================== UI 함수 (기존 로직 최대한 유지) ====================
async function renderFolders() {
  const folders = await fetchFolders();
  // ... 기존 folderGridEl.innerHTML 로직 ...
  // (폴더 타일 생성 부분은 기존 코드 그대로 사용하되 state 대신 DB 데이터 사용)
}

async function openFolder(name) {
  activeFolder = name;
  // ... UI 전환 ...
  await renderFiles();
}

async function renderFiles() {
  const files = await fetchFiles(activeFolder);
  // ... 기존 fileGridEl.innerHTML 로직 ...
}

// 파일 업로드
async function uploadFile(file, folderName) {
  const fileExt = file.name.split('.').pop();
  const fileName = `\( {Date.now()}- \){file.name}`;

  const { error: uploadError } = await supabase.storage
    .from('uploads')
    .upload(`\( {folderName}/ \){fileName}`, file);

  if (uploadError) {
    alert('업로드 실패: ' + uploadError.message);
    return;
  }

  const { data: urlData } = supabase.storage
    .from('uploads')
    .getPublicUrl(`\( {folderName}/ \){fileName}`);

  // DB에 메타데이터 저장
  await supabase.from('files').insert({
    folder_name: folderName,
    name: file.name,
    size: file.size,
    url: urlData.publicUrl,
    storage_path: `\( {folderName}/ \){fileName}`
  });
}

// 다운로드 + 로그
async function handleFileDownload(fileRecord) {
  const id = prompt('스레드 아이디를 입력해주세요');
  if (!id) return;

  // 로그 기록
  await supabase.from('download_logs').insert({
    file_id: fileRecord.id,
    thread_id: id,
    file_name: fileRecord.name
  });

  window.open(fileRecord.url, '_blank');
}

// ==================== 초기화 ====================
async function init() {
  subscribeToFiles();
  await renderFolders();
}

// 페이지 로드 시 실행
window.onload = init;
</script>
