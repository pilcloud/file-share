<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pil cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#faf9f5;
    --card:#ffffff;
    --ink:#1e1e1e;
    --accent:#39c0a0;
    --accent-dark:#279c80;
    --line:#e7e4dc;
    --muted:#8b8880;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans KR', sans-serif;
    min-height:100vh;
  }
  .korean-display{font-family:'Jua', sans-serif;}

  .wrap{max-width:1040px; margin:0 auto; padding:32px 24px;}
  .app-header{display:flex; align-items:center; gap:12px; margin-bottom:28px;}
  .app-header img{width:38px; height:auto;}
  .app-header h1{font-size:24px; margin:0; font-family:'Jua', sans-serif;}

  .tile-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:16px;
  }
  .folder-tile{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px 16px;
    cursor:pointer;
    text-align:center;
    transition:transform .12s, box-shadow .12s;
  }
  .folder-tile:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 24px -14px rgba(30,30,30,.25);
    border-color:var(--accent);
  }
  .folder-emoji{font-size:48px; margin-bottom:8px;}
  .fname{font-family:'Jua', sans-serif; font-size:16px;}
</style>
</head>
<body>

<div class="wrap">
  <div class="app-header">
    <h1>Pil cloud</h1>
  </div>

  <div id="folderGrid" class="tile-grid"></div>
</div>

<script>
// ==================== Supabase 설정 ====================
const SUPABASE_URL = "https://zdovvhgkmgbtssgaihnz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpkb3Z2aGdrbWdidHNzZ2FpaG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNjY0MTUsImV4cCI6MjA5OTg0MjQxNX0.C2yAhaBMvTpQCWBMYzVgw7oJzXupSfTzyvdmkYT1fiM";

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const UPLOAD_PASSWORD = "1234";   // 관리자 업로드 비밀번호

// 기본 폴더
const folders = ["성진", "영현", "원필", "도운"];

async function renderFolders() {
  const grid = document.getElementById('folderGrid');
  grid.innerHTML = '';

  folders.forEach(name => {
    const tile = document.createElement('div');
    tile.className = 'folder-tile';
    tile.innerHTML = `
      <div class="folder-emoji">🐻</div>
      <div class="fname">${name}</div>
      <div style="font-size:12px;color:var(--muted);">0개 파일</div>
    `;
    tile.onclick = () => alert(`${name} 폴더를 열었습니다.\nSupabase 연동이 준비되었습니다!`);
    grid.appendChild(tile);
  });
}

// 페이지 로드
window.onload = () => {
  renderFolders();
  console.log("✅ Pil Cloud + Supabase 연동 페이지 로드 완료");
};
</script>
</body>
</html>
