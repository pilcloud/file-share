<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>파일 공유</title>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body{

font-family:sans-serif;

max-width:700px;

margin:auto;

padding:20px;

}

h2{

text-align:center;

}

button{

padding:10px 15px;

margin-top:10px;

cursor:pointer;

}

.file{

border:1px solid #ddd;

border-radius:10px;

padding:12px;

margin-top:10px;

}

a{

margin-right:10px;

}

</style>

</head>


<body>


<h2>📁 파일 공유</h2>


<input type="file" id="fileInput">

<button onclick="uploadFile()">업로드</button>


<div id="files"></div>


<script>

const supabase = window.supabase.createClient(

"https://zdovvhgkmgbtssgaihnz.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9......"

);



async function uploadFile() {

const file = document.getElementById('fileInput').files[0];


if (!file) {

alert('파일을 선택해주세요.');

return;

}


const fileName = Date.now() + "_" + file.name;


const { error } = await supabase.storage

.from('files')

.upload(fileName, file);


if (error) {

alert(error.message);

console.error(error);

return;

}


alert('업로드 완료!');

loadFiles();

}


async function loadFiles() {

const { data, error } = await supabase.storage

.from('files')

.list('', {

sortBy: { column: 'created_at', order: 'desc' }

});


if (error) {

console.error(error);

return;

}


const box = document.getElementById('files');

box.innerHTML = '';


data.forEach(file => {

const { data: urlData } = supabase.storage

.from('files')

.getPublicUrl(file.name);


box.innerHTML += &lt;div class="file"&gt; &lt;strong&gt;${file.name}</strong><br><br>

<a href="${urlData.publicUrl}" target="_blank"&gt;📂 열기&lt;/a&gt; &lt;a href="${urlData.publicUrl}" download&gt;⬇️ 다운로드&lt;/a&gt; &lt;/div&gt;;

});

}


loadFiles();

</script>


</body>

</html>
